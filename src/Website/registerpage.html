<!DOCTYPE HTML>
<HTML>
    <head>
        <link rel="Stylesheet" href="stylesheet.css">
    </head>
    <body>

        <div id="outer">
            <div id="inner">

                <button id="zuruck" onclick="document.location='index.html'"> Zurück </button>

                
                <form>
                    <label for="username"> Email </label><br>
                    <input type="text" id="username" name="username"> <br>
                    <label for="password"> Passwort </label><br>
                    <input type="password" id="password" name="password"><br>
                    <label for="firstname"> Vorname </label><br>
                    <input type="text" id="firstname" name="firstname"> <br>
                    <label for="lastname"> Nachname </label><br>
                    <input type="text" id="lastname" name="lastname"><br>
                    

                    <div id="langueges">
                    <label id="spr"> Sprachen </label> 
                    <input type="radio" id="de" name="lang" value="de"   checked>
                    <label for="de"> Deutsch </label>
                    <input type="radio" id="en" name="lang" value="en"  >
                    <label for="en"> Englisch </label>
                    <input type="radio" id="fr" name="lang" value="fr"  >
                    <label for="fr"> Franzoesisch </label>
                    </div>
                    
                    <input type="submit">


                </form>
                

            </div>
        </div>

        <footer> 
        <p> © Luka Vucer 2026 </p> 
        </footer> 


    </body>
</HTML>

<script>

document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        firstname: document.getElementById("firstname").value,
        lastname: document.getElementById("lastname").value,
        language: document.querySelector('input[name="lang"]:checked').value.toLowerCase()
    };

    try {
        const response = await fetch("https://ipt71.kuno-schuerch.bbzwinf.ch/user/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        console.log(result);
        alert("gut");
    } catch (error) {
        console.error("Error:", error);
        alert("fail");
    }

});
</script>
